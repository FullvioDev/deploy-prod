services:
  etcd:
    image: quay.io/coreos/etcd:${ETCD_TAG:-v3.6.12}
    container_name: ${ETCD_CNTNR:-milvus-etcd}
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DIR}/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - milvus

  seaweedfs:
    image: chrislusf/seaweedfs:${SEAWEEDFS_TAG:-4.31}
    container_name: ${SEAWEEDFS_CNTNR:-milvus_seaweedfs}
    restart: unless-stopped
    command: ["mini", "-dir=/data"]
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-milvus-bucket}
    volumes:
      - ${DIR}/milvus/seaweedfs:/data
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8333/"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - milvus

  standalone:
    image: milvusdb/milvus:${MILVUS_TAG:-v2.6.17}
    container_name: ${MILVUS_CNTNR:-milvus}
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    # security_opt:
    # - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: seaweedfs:8333
      MINIO_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      MINIO_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${S3_BUCKET:-milvus-bucket}
    volumes:
      - ${DIR}/milvus/milvusdb:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 90s
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - milvus

networks:
  milvus:
    name: milvus
    driver: bridge
