services:
    postgres:
        image: pgvector/pgvector:${POSTGRES_TAG:-pg16}
        container_name: ${POSTGRES_CNTNR:-postgres}
        restart: always
        security_opt:
            - no-new-privileges:true
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-fullvio}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
            POSTGRES_DB: ${POSTGRES_DB:-fullvio_webui}
        volumes:
            - ${DIR:?}/postgres:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-fullvio} -d ${POSTGRES_DB:-fullvio_webui}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - webui

    redis:
        image: redis:${REDIS_TAG:-7-alpine}
        container_name: ${REDIS_CNTNR:-redis}
        restart: always
        security_opt:
            - no-new-privileges:true
        command:
            [
                "redis-server",
                "--requirepass",
                "${REDIS_PASSWORD:?}",
                "--appendonly",
                "yes",
            ]
        environment:
            REDISCLI_AUTH: ${REDIS_PASSWORD}
        volumes:
            - ${DIR}/redis:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - webui

    webui:
        image: fullvio/webui:${WEBUI_TAG:-v0.9.6F}
        container_name: ${WEBUI_CNTNR:-webui}
        restart: always
        security_opt:
            - no-new-privileges:true
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        ports:
            - "${HOST_PORT:-8000}:8080"
        volumes:
            - ${DIR}/data:/app/backend/data
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"
        environment:
            DOCKER: "true"
            ENV: "prod"
            PORT: "8080"
            UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
            GLOBAL_LOG_LEVEL: ${WEBUI_LOG_LEVEL:-INFO}
            ENABLE_PERSISTENT_CONFIG: ${ENABLE_PERSISTENT_CONFIG:-false}
            ENABLE_VERSION_UPDATE_CHECK: ${ENABLE_VERSION_UPDATE_CHECK:-false}
            OFFLINE_MODE: "false"
            CUSTOM_NAME: ${CUSTOM_NAME}
            WEBUI_NAME: ${WEBUI_NAME}
            WEBUI_URL: ${WEBUI_URL:?}
            WEBUI_AUTH: "true"
            WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?}
            ENABLE_LOGIN_FORM: "true"
            ENABLE_SIGNUP: ${ENABLE_SIGNUP:-false}
            DEFAULT_USER_ROLE: "pending"
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
            BYPASS_MODEL_ACCESS_CONTROL: "false"
            ENABLE_ADMIN_EXPORT: "true"
            ENABLE_ADMIN_CHAT_ACCESS: "true"
            ADMIN_EMAIL: ${ADMIN_EMAIL}
            WEBUI_SESSION_COOKIE_SECURE: "true"
            WEBUI_SESSION_COOKIE_SAME_SITE: ${WEBUI_COOKIE_SAME_SITE}
            CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
            FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
            PENDING_USER_OVERLAY_TITLE: ${PENDING_USER_OVERLAY_TITLE}
            PENDING_USER_OVERLAY_CONTENT: ${PENDING_USER_OVERLAY_CONTENT}
            RESPONSE_WATERMARK: ${RESPONSE_WATERMARK}
            DATABASE_URL: postgresql://${POSTGRES_USER:-fullvio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fullvio_webui}
            DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-15}
            DATABASE_POOL_MAX_OVERFLOW: ${DATABASE_POOL_MAX_OVERFLOW:-20}
            DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
            DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE:-3600}
            ENABLE_DB_MIGRATIONS: "true"
            REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
            WEBSOCKET_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
            ENABLE_WEBSOCKET_SUPPORT: "true"
            WEBSOCKET_MANAGER: "redis"
            VECTOR_DB: "pgvector"
            PGVECTOR_DB_URL: postgresql://${POSTGRES_USER:-fullvio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fullvio_webui}
            REQUESTS_VERIFY: "true"
            ENABLE_RAG_LOCAL_WEB_FETCH: "false"
            ENABLE_OTEL: ${ENABLE_OTEL:-true}
            ENABLE_OTEL_METRICS: ${ENABLE_OTEL_METRICS:-true}
            ENABLE_OTEL_TRACES: ${ENABLE_OTEL_TRACES:-false}
            OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fullvio-webui}
            OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
            OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
            OTEL_METRICS_EXPORT_INTERVAL_MILLIS: ${OTEL_METRICS_EXPORT_INTERVAL_MILLIS:-60000}
            ENABLE_OPENAI_API: "true"
            OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-}
            OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}
            ENABLE_EVALUATION_ARENA_MODELS: ${ENABLE_EVALUATION_ARENA_MODELS:-false}
            ENABLE_OLLAMA_API: ${ENABLE_OLLAMA_API:-false}
            ENABLE_API_KEYS: ${ENABLE_API_KEYS:-false}
            ENABLE_API_KEYS_ENDPOINT_RESTRICTIONS: ${ENABLE_API_KEYS_ENDPOINT_RESTRICTIONS:-false}
            API_KEYS_ALLOWED_ENDPOINTS: ${API_KEYS_ALLOWED_ENDPOINTS:-}
            CUSTOM_API_KEY_HEADER: ${CUSTOM_API_KEY_HEADER:-x-api-key}
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://127.0.0.1:8080/health || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 60s
        networks:
            - webui

networks:
    webui:
        driver: bridge
